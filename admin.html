<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Alquimia Propiedades</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,700;1,400&family=Hanken+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* Admin-specific overrides */
    .admin-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1001;
      background: var(--tinta, #0F0A1A); color: var(--perla, #F7F5F2); height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--space-2xl, 48px); font-size: 13px;
      backdrop-filter: blur(12px);
    }
    .admin-bar-left { display: flex; align-items: center; gap: 16px; }
    .admin-bar-left img { height: 22px; width: auto; }
    .admin-bar-left span {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em;
      color: var(--lavanda, #C5B3D9); opacity: 0.6;
    }
    .admin-bar button {
      background: rgba(197,179,217,0.12); border: none; color: var(--lavanda, #C5B3D9);
      padding: 6px 18px; border-radius: 100px; cursor: pointer;
      font-family: 'Hanken Grotesk', sans-serif; font-size: 11px;
      letter-spacing: 0.04em; transition: background 200ms;
    }
    .admin-bar button:hover { background: rgba(197,179,217,0.22); }
    .navbar { display: none; }
    body { padding-top: 56px; }

    /* Login */
    .login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 56px); padding: 24px;
      background: var(--tinta, #0F0A1A);
    }
    .login-box {
      background: var(--plum, #2B1F3D); border-radius: 16px; padding: 48px 40px;
      width: 100%; max-width: 380px; text-align: center;
      border: 1px solid rgba(197,179,217,0.1);
    }
    .login-box h2 {
      font-family: 'Fraunces', serif; font-size: 26px; font-weight: 400;
      color: var(--perla, #F7F5F2); margin-bottom: 6px;
    }
    .login-box p { color: var(--lavanda, #C5B3D9); font-size: 13px; margin-bottom: 28px; opacity: 0.6; }
    .login-box input {
      width: 100%; padding: 12px 16px; border: 1px solid rgba(197,179,217,0.2);
      border-radius: 8px; font-family: 'Hanken Grotesk', sans-serif; font-size: 14px;
      margin-bottom: 12px; background: rgba(15,10,26,0.5); color: var(--perla, #F7F5F2);
    }
    .login-box input::placeholder { color: rgba(197,179,217,0.35); }
    .login-box input:focus { outline: 2px solid var(--oro, #D4A44A); border-color: transparent; }
    .login-btn {
      width: 100%; padding: 13px; background: var(--oro, #D4A44A); color: var(--tinta, #0F0A1A);
      border: none; border-radius: 100px; font-family: 'Hanken Grotesk', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: 0.04em;
      text-transform: uppercase; transition: transform 200ms, box-shadow 200ms;
    }
    .login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(212,164,74,0.3); }
    .login-error { color: #e07070; font-size: 12px; margin-top: 12px; display: none; }

    /* Cards view */
    .admin-content { padding: 40px var(--space-2xl, 48px); max-width: 1200px; margin: 0 auto; }
    .admin-actions { display: flex; gap: 12px; margin-bottom: 28px; align-items: center; }
    .btn-new {
      background: var(--oro, #D4A44A); color: var(--tinta, #0F0A1A); border: none;
      padding: 10px 24px; border-radius: 100px; font-family: 'Hanken Grotesk', sans-serif;
      font-size: 12px; font-weight: 600; cursor: pointer; letter-spacing: 0.04em;
      text-transform: uppercase; transition: transform 200ms;
    }
    .btn-new:hover { transform: translateY(-1px); }
    .admin-status { font-size: 12px; color: var(--color-text-tertiary, #7a7288); margin-left: auto; }

    /* Editable ficha overrides */
    .edit-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(15, 10, 26, 0.7);
      backdrop-filter: blur(4px);
      z-index: 1002; overflow-y: auto; padding: 24px;
    }
    .edit-overlay.open { display: block; }
    .edit-wrap {
      max-width: 800px; margin: 20px auto; position: relative;
    }
    .edit-topbar {
      display: flex; gap: 12px; justify-content: space-between; align-items: center;
      margin-bottom: 16px; position: sticky; top: 0; z-index: 10;
      background: var(--tinta, #0F0A1A); padding: 14px 20px; border-radius: 12px;
      border: 1px solid rgba(197,179,217,0.1);
    }
    .edit-topbar span {
      color: var(--perla, #F7F5F2); font-family: 'Fraunces', serif;
      font-size: 15px; font-weight: 400;
    }
    .btn-save {
      background: var(--oro, #D4A44A); color: var(--tinta, #0F0A1A); border: none;
      padding: 8px 24px; border-radius: 100px; font-family: 'Hanken Grotesk', sans-serif;
      font-size: 12px; font-weight: 600; cursor: pointer; letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .btn-save:hover { opacity: 0.9; }
    .btn-cancel {
      background: rgba(197,179,217,0.12); color: var(--lavanda, #C5B3D9); border: none;
      padding: 8px 18px; border-radius: 100px; font-family: 'Hanken Grotesk', sans-serif;
      font-size: 12px; cursor: pointer; letter-spacing: 0.02em;
    }
    .btn-delete {
      background: rgba(180,60,60,0.15); color: #e07070; border: none;
      padding: 8px 18px; border-radius: 100px; font-family: 'Hanken Grotesk', sans-serif;
      font-size: 12px; cursor: pointer; letter-spacing: 0.02em;
    }
    .btn-delete:hover { background: rgba(180,60,60,0.25); }

    /* Editable fields inside ficha */
    .e-field {
      background: rgba(212,164,74,0.06); border: 1px dashed rgba(212,164,74,0.35);
      border-radius: 4px; padding: 2px 6px; min-width: 40px;
      outline: none; cursor: text;
    }
    .e-field:focus { background: var(--oro-wash, #faf4e6); border-style: solid; border-color: var(--oro, #D4A44A); }
    textarea.e-area {
      width: 100%; min-height: 60px; padding: 10px; border: 1px dashed rgba(212,164,74,0.35);
      border-radius: 8px; font-family: 'Hanken Grotesk', sans-serif; font-size: 13px;
      background: rgba(212,164,74,0.06); resize: vertical; line-height: 1.7;
      color: var(--color-text, #0F0A1A);
    }
    textarea.e-area:focus { background: var(--oro-wash, #faf4e6); border-style: solid; border-color: var(--oro, #D4A44A); outline: none; }

    /* List editors */
    .e-list { margin-bottom: 16px; }
    .e-list-item {
      display: flex; gap: 6px; align-items: center; margin-bottom: 6px;
    }
    .e-list-item input {
      flex: 1; padding: 7px 10px; border: 1px solid var(--color-border, #e8e4de);
      border-radius: 6px; font-family: 'Hanken Grotesk', sans-serif; font-size: 12px;
      color: var(--color-text, #0F0A1A); background: var(--perla, #F7F5F2);
    }
    .e-list-item input:focus { outline: 2px solid var(--oro, #D4A44A); outline-offset: -1px; border-color: transparent; }
    .e-rm {
      background: none; border: none; color: #c07070; font-size: 16px;
      cursor: pointer; padding: 4px; line-height: 1; transition: color 200ms;
    }
    .e-rm:hover { color: #e05050; }
    .e-add {
      background: none; border: 1px dashed rgba(212,164,74,0.3); color: var(--cobre, #A56A3E);
      padding: 5px 14px; border-radius: 100px; font-size: 11px; cursor: pointer;
      font-family: 'Hanken Grotesk', sans-serif; letter-spacing: 0.02em;
      transition: border-color 200ms, color 200ms;
    }
    .e-add:hover { border-color: var(--oro, #D4A44A); color: var(--oro, #D4A44A); }

    .e-section-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--cobre, #A56A3E); font-weight: 700; margin: 20px 0 8px; display: block;
    }
  </style>
</head>
<body>

<!-- ADMIN BAR -->
<div class="admin-bar">
  <div class="admin-bar-left">
    <img src="img/logo_alquimia_key_white.png" alt="Alquimia">
    <span>Administrador</span>
  </div>
  <div>
    <span id="admin-email" style="margin-right:12px;opacity:0.5;font-size:11px"></span>
    <button onclick="logout()">Cerrar sesi&oacute;n</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <img src="img/logo_alquimia_key_white.png" alt="Alquimia" style="height:32px;margin:0 auto 20px;display:block;opacity:0.7">
    <h2>Administrador</h2>
    <p>Ingresa tus credenciales</p>
    <input type="email" id="login-email" placeholder="Email">
    <input type="password" id="login-pass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="login-error">Credenciales incorrectas</div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="main-content" style="display:none">
  <div class="admin-content">
    <div class="section-header">
      <h2>Propiedades</h2>
    </div>
    <div class="admin-actions">
      <button class="btn-new" onclick="openNew()">+ Nueva propiedad</button>
      <span class="admin-status" id="status-msg"></span>
    </div>
    <div class="properties-grid" id="admin-grid"></div>
  </div>
</div>

<!-- EDIT OVERLAY -->
<div class="edit-overlay" id="edit-overlay">
  <div class="edit-wrap">
    <div class="edit-topbar">
      <div style="display:flex;gap:8px">
        <button class="btn-cancel" onclick="closeEdit()">Cerrar</button>
        <button class="btn-delete" id="btn-delete" onclick="doDelete()">Eliminar</button>
      </div>
      <span id="edit-title-bar">Editando propiedad</span>
      <button class="btn-save" onclick="doSave()">Guardar cambios</button>
    </div>
    <div class="ficha-card" id="edit-ficha"></div>
  </div>
</div>

<script>
// ===== STATE =====
let token = localStorage.getItem('kp-admin-token');
let properties = [];
let editingProp = null;
let editingIdx = -1;
let isNew = false;

const API = '/api/propiedades';
const AUTH = '/api/auth';

function headers() {
  return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
}

// ===== AUTH =====
async function doLogin() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  try {
    const res = await fetch(AUTH, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email, password: pass}) });
    if (!res.ok) throw new Error();
    const data = await res.json();
    token = data.token;
    localStorage.setItem('kp-admin-token', token);
    showApp(email);
  } catch {
    document.getElementById('login-error').style.display = 'block';
  }
}

function logout() {
  token = null;
  localStorage.removeItem('kp-admin-token');
  location.reload();
}

async function showApp(email) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  document.getElementById('admin-email').textContent = email || '';
  await loadProperties();
}

// ===== DATA =====
async function loadProperties() {
  setStatus('Cargando...');
  try {
    let res = await fetch(API, { headers: headers() });
    let data = await res.json();

    // Auto-seed from static JSON if API is empty
    if (!data || data.length === 0) {
      setStatus('Importando propiedades...');
      const seed = await fetch('data/propiedades.json').then(r => r.json());
      await fetch(API, { method: 'POST', headers: headers(), body: JSON.stringify(seed) });
      data = seed;
    }

    properties = data;
    renderCards();
    setStatus(properties.length + ' propiedades');
  } catch (e) {
    // If auth failed, go back to login
    if (e.message?.includes('401')) { logout(); return; }
    // Fallback to static
    try {
      properties = await fetch('data/propiedades.json').then(r => r.json());
      renderCards();
      setStatus(properties.length + ' propiedades (modo local)');
    } catch { setStatus('Error cargando propiedades'); }
  }
}

function setStatus(msg) { document.getElementById('status-msg').textContent = msg; }

// ===== CARDS =====
function renderCards() {
  const grid = document.getElementById('admin-grid');
  grid.innerHTML = properties.map((p, i) => `
    <div class="property-card" onclick="openEdit(${i})" style="cursor:pointer">
      <div class="card-img-wrap">
        <img src="${p.imagenes?.hero || ''}" alt="${p.titulo}" loading="lazy">
        ${p.estado ? `<span class="card-badge">${p.estado}</span>` : ''}
        <span class="card-op">${p.operacion}</span>
      </div>
      <div class="card-body">
        <div class="card-price">${p.precio_formato}</div>
        <div class="card-address">${p.direccion}</div>
        <div class="card-stats">
          <div class="card-stat"><span>${p.dormitorios}</span> dorm.</div>
          <div class="card-stat"><span>${p.banos}</span> banos</div>
          <div class="card-stat"><span>${p.superficie_util}</span> m2</div>
          <div class="card-stat"><span>${p.estacionamientos}</span> estac.</div>
        </div>
      </div>
    </div>
  `).join('');
}

// ===== EDITABLE FICHA =====
function ef(val, field, type) {
  // editable field inline
  if (type === 'area') return `<textarea class="e-area" data-field="${field}">${val || ''}</textarea>`;
  return `<span class="e-field" contenteditable="true" data-field="${field}">${val ?? ''}</span>`;
}

function listEditor(items, listId, fields) {
  // fields: array of {key, placeholder, width?}
  let html = `<div class="e-list" id="list-${listId}">`;
  (items || []).forEach((item, i) => {
    html += `<div class="e-list-item" data-list="${listId}" data-i="${i}">`;
    if (typeof item === 'string') {
      html += `<input value="${esc(item)}" data-key="value" style="flex:1">`;
    } else {
      fields.forEach(f => {
        html += `<input value="${esc(item[f.key] || '')}" data-key="${f.key}" placeholder="${f.placeholder}" style="flex:${f.width||1}">`;
      });
    }
    html += `<button class="e-rm" onclick="rmListItem('${listId}',${i})">×</button></div>`;
  });
  html += `<button class="e-add" onclick="addListItem('${listId}')">+ Agregar</button></div>`;
  return html;
}

function esc(s) { return String(s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function renderEditFicha(p) {
  const f = document.getElementById('edit-ficha');
  document.getElementById('edit-title-bar').textContent = isNew ? 'Nueva propiedad' : p.titulo;
  document.getElementById('btn-delete').style.display = isNew ? 'none' : '';

  f.innerHTML = `
    <!-- HERO IMAGE -->
    <div class="ficha-header">
      <div class="ficha-hero-wrap" style="cursor:default">
        <img src="${p.imagenes?.hero || ''}" alt="" id="edit-hero-img">
        ${p.estado ? `<span class="ficha-badge">${ef(p.estado,'estado')}</span>` : ''}
      </div>
    </div>

    <!-- PRICE BAR -->
    <div class="ficha-price-bar">
      <div class="ficha-price-bar-left">
        <div class="ficha-price-main">${ef(p.precio_formato,'precio_formato')}</div>
        <div class="ficha-price-detail">
          ${ef(p.operacion,'operacion')} · GC ${ef(p.gastos_comunes,'gastos_comunes')}
        </div>
      </div>
    </div>

    <div class="ficha-body">
      <!-- BASIC INFO -->
      <div class="ficha-title">${ef(p.titulo,'titulo')}</div>
      <div class="ficha-address">${ef(p.direccion,'direccion')}, ${ef(p.comuna,'comuna')}</div>

      <div class="ficha-stats">
        <div class="ficha-stat-box"><div class="ficha-stat-val">${ef(p.dormitorios,'dormitorios')}</div><div class="ficha-stat-lbl">Dormitorios</div></div>
        <div class="ficha-stat-box"><div class="ficha-stat-val">${ef(p.banos,'banos')}</div><div class="ficha-stat-lbl">Banos</div></div>
        <div class="ficha-stat-box"><div class="ficha-stat-val">${ef(p.superficie_util,'superficie_util')}</div><div class="ficha-stat-lbl">m2 utiles</div></div>
        <div class="ficha-stat-box"><div class="ficha-stat-val">${ef(p.piso,'piso')}</div><div class="ficha-stat-lbl">Piso</div></div>
        <div class="ficha-stat-box"><div class="ficha-stat-val">${ef(p.estacionamientos,'estacionamientos')}</div><div class="ficha-stat-lbl">Estac.</div></div>
      </div>

      <label class="e-section-label">Datos adicionales</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-bottom:16px;font-size:13px;color:#666">
        <div>Precio (num): ${ef(p.precio,'precio')}</div>
        <div>Moneda: ${ef(p.moneda,'moneda')}</div>
        <div>Tipo: ${ef(p.tipo,'tipo')}</div>
        <div>Sup. total: ${ef(p.superficie_total,'superficie_total')}</div>
        <div>Terraza: ${ef(p.terraza,'terraza')}</div>
        <div>Orientacion: ${ef(p.orientacion,'orientacion')}</div>
      </div>

      <!-- HIGHLIGHT -->
      <div class="ficha-highlight">
        <div class="ficha-highlight-title">Por que esta propiedad</div>
        ${ef(p.highlight,'highlight','area')}
      </div>

      <!-- DESCRIPTION -->
      <div class="ficha-section-title">Descripcion</div>
      ${ef(p.descripcion,'descripcion','area')}

      <!-- IMAGES -->
      <div class="ficha-section-title">Imagenes</div>
      <label class="e-section-label">Hero (URL)</label>
      <div class="e-list"><div class="e-list-item"><input id="edit-hero-url" value="${esc(p.imagenes?.hero)}" style="flex:1" onchange="document.getElementById('edit-hero-img').src=this.value"></div></div>
      <label class="e-section-label">Thumbnails</label>
      ${listEditor(p.imagenes?.thumbnails || [], 'thumbnails', [{key:'value',placeholder:'URL imagen'}])}
      <label class="e-section-label">Galeria (recorrido)</label>
      ${listEditor(p.imagenes?.galeria || [], 'galeria', [{key:'src',placeholder:'URL imagen',width:2},{key:'label',placeholder:'Nombre recinto',width:1}])}

      <!-- CHARACTERISTICS -->
      <div class="ficha-section-title">Caracteristicas</div>
      ${listEditor(p.caracteristicas || [], 'caracteristicas', [{key:'value',placeholder:'Ej: 2 dormitorios en suite'}])}

      <!-- TAGS -->
      <div class="ficha-section-title">Tags</div>
      ${listEditor(p.tags || [], 'tags', [{key:'icono',placeholder:'Emoji',width:0.3},{key:'texto',placeholder:'Texto',width:2},{key:'tipo',placeholder:'default/gold',width:0.8}])}

      <!-- FICHA TECNICA -->
      <div class="ficha-section-title">Ficha tecnica</div>
      ${listEditor(p.ficha_tecnica || [], 'ficha_tecnica', [{key:'campo',placeholder:'Campo',width:1},{key:'valor',placeholder:'Valor',width:1}])}

      <!-- SERVICES -->
      <div class="ficha-section-title">Servicios del edificio</div>
      ${listEditor(p.servicios_edificio || [], 'servicios', [{key:'icono',placeholder:'Emoji',width:0.3},{key:'nombre',placeholder:'Servicio',width:2}])}

      <!-- TRANSPORT -->
      <div class="ficha-section-title">Transporte</div>
      ${listEditor(p.transporte || [], 'transporte', [{key:'tipo',placeholder:'metro/bus',width:0.6},{key:'nombre',placeholder:'Nombre',width:2},{key:'distancia',placeholder:'Dist.',width:0.6},{key:'tiempo',placeholder:'Tiempo',width:0.6}])}

      <!-- AGENT -->
      <div class="ficha-section-title">Agente</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-bottom:16px;font-size:13px;color:#666">
        <div>Nombre: ${ef(p.agente?.nombre,'agente.nombre')}</div>
        <div>Telefono: ${ef(p.agente?.telefono,'agente.telefono')}</div>
        <div>WhatsApp: ${ef(p.agente?.whatsapp,'agente.whatsapp')}</div>
        <div>Email: ${ef(p.agente?.email,'agente.email')}</div>
      </div>
    </div>
  `;
}

// ===== LIST OPERATIONS =====
function getListData(listId) {
  const container = document.getElementById('list-' + listId);
  if (!container) return [];
  const items = container.querySelectorAll('.e-list-item');
  return Array.from(items).map(row => {
    const inputs = row.querySelectorAll('input');
    if (inputs.length === 1 && inputs[0].dataset.key === 'value') return inputs[0].value;
    const obj = {};
    inputs.forEach(inp => { obj[inp.dataset.key] = inp.value; });
    return obj;
  });
}

function rmListItem(listId, idx) {
  const container = document.getElementById('list-' + listId);
  const items = container.querySelectorAll('.e-list-item');
  if (items[idx]) items[idx].remove();
}

function addListItem(listId) {
  const container = document.getElementById('list-' + listId);
  const addBtn = container.querySelector('.e-add');
  // Clone structure from first item or create default
  const existing = container.querySelector('.e-list-item');
  const div = document.createElement('div');
  div.className = 'e-list-item';
  div.dataset.list = listId;

  if (existing) {
    const inputs = existing.querySelectorAll('input');
    inputs.forEach(inp => {
      const newInp = document.createElement('input');
      newInp.dataset.key = inp.dataset.key;
      newInp.placeholder = inp.placeholder;
      newInp.style.flex = inp.style.flex;
      div.appendChild(newInp);
    });
  } else {
    const inp = document.createElement('input');
    inp.dataset.key = 'value';
    inp.style.flex = '1';
    div.appendChild(inp);
  }
  const rm = document.createElement('button');
  rm.className = 'e-rm';
  rm.textContent = '×';
  rm.onclick = () => div.remove();
  div.appendChild(rm);
  container.insertBefore(div, addBtn);
}

// ===== COLLECT FORM DATA =====
function collectData() {
  const p = JSON.parse(JSON.stringify(editingProp));

  // Simple fields from contenteditable spans
  document.querySelectorAll('#edit-ficha .e-field').forEach(el => {
    const field = el.dataset.field;
    const val = el.textContent.trim();
    if (field.includes('.')) {
      const [obj, key] = field.split('.');
      if (!p[obj]) p[obj] = {};
      p[obj][key] = val;
    } else {
      // Convert numbers
      if (['precio','dormitorios','banos','superficie_util','superficie_total','terraza','estacionamientos'].includes(field)) {
        p[field] = val === '' ? null : Number(val);
      } else {
        p[field] = val;
      }
    }
  });

  // Textareas
  document.querySelectorAll('#edit-ficha .e-area').forEach(el => {
    p[el.dataset.field] = el.value.trim();
  });

  // Images
  p.imagenes = p.imagenes || {};
  p.imagenes.hero = document.getElementById('edit-hero-url')?.value || '';
  p.imagenes.thumbnails = getListData('thumbnails');
  p.imagenes.galeria = getListData('galeria');

  // Lists
  p.caracteristicas = getListData('caracteristicas');
  p.tags = getListData('tags');
  p.ficha_tecnica = getListData('ficha_tecnica');
  p.servicios_edificio = getListData('servicios');
  p.transporte = getListData('transporte');

  return p;
}

// ===== CRUD =====
function openEdit(idx) {
  editingIdx = idx;
  editingProp = JSON.parse(JSON.stringify(properties[idx]));
  isNew = false;
  renderEditFicha(editingProp);
  document.getElementById('edit-overlay').classList.add('open');
  document.getElementById('edit-overlay').scrollTop = 0;
}

function openNew() {
  editingIdx = -1;
  isNew = true;
  editingProp = {
    id: '', slug: '', titulo: 'Nueva propiedad', direccion: '', comuna: '',
    precio: 0, precio_formato: '', moneda: 'CLP', gastos_comunes: '',
    operacion: 'Venta', tipo: 'Departamento', estado: 'Nuevo ingreso',
    dormitorios: 0, banos: 0, superficie_util: 0, superficie_total: 0,
    terraza: null, piso: '', estacionamientos: 0, orientacion: '',
    highlight: '', descripcion: '',
    caracteristicas: [], tags: [], ficha_tecnica: [],
    servicios_edificio: [], transporte: [],
    imagenes: { hero: '', thumbnails: [], galeria: [] },
    agente: { nombre: 'Keyla Tobar', telefono: '+56985298224', whatsapp: '+56985298224', email: 'contacto@alquimiapropiedades.com' }
  };
  renderEditFicha(editingProp);
  document.getElementById('edit-overlay').classList.add('open');
  document.getElementById('edit-overlay').scrollTop = 0;
}

function closeEdit() {
  document.getElementById('edit-overlay').classList.remove('open');
  editingProp = null;
}

async function doSave() {
  const data = collectData();
  try {
    let res;
    if (isNew) {
      res = await fetch(API, { method: 'POST', headers: headers(), body: JSON.stringify(data) });
    } else {
      res = await fetch(API + '/' + data.id, { method: 'PUT', headers: headers(), body: JSON.stringify(data) });
    }
    if (!res.ok) throw new Error('Error ' + res.status);
    closeEdit();
    await loadProperties();
    setStatus('Guardado');
  } catch (e) {
    alert('Error al guardar: ' + e.message);
  }
}

async function doDelete() {
  if (!editingProp?.id || !confirm('Eliminar "' + editingProp.titulo + '"?')) return;
  try {
    const res = await fetch(API + '/' + editingProp.id, { method: 'DELETE', headers: headers() });
    if (!res.ok) throw new Error('Error ' + res.status);
    closeEdit();
    await loadProperties();
    setStatus('Eliminada');
  } catch (e) {
    alert('Error al eliminar: ' + e.message);
  }
}

// ===== INIT =====
(async () => {
  if (token) {
    // Validate token by trying API
    try {
      const res = await fetch(API, { headers: headers() });
      if (res.status === 401) throw new Error();
      showApp();
    } catch {
      // Token expired or invalid
      token = null;
      localStorage.removeItem('kp-admin-token');
    }
  }
  if (!token) {
    document.getElementById('login-screen').style.display = 'flex';
  }
})();
</script>
